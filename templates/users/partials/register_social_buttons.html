{% load static %}
{% load socialaccount %}
<div class="px-4 pb-2">
    {% if google_social_auth_enabled %}
    <a class="btn btn-outline-dark w-100 mb-2 d-inline-flex align-items-center justify-content-center gap-2" href="{% provider_login_url 'google' process=social_process %}">
        {{ social_button_label|default:"Continue with" }}
        <img src="{% static 'images/icons/google.png' %}" alt="Google" style="width: 18px; height: 18px; object-fit: contain;">
    </a>
    {% endif %}
    <div class="text-center text-muted small mb-3">{{ social_divider_label|default:"or continue with email" }}</div>
</div>
